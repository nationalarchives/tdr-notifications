name: TDR Tag and pre deploy
on:
  push:
    branches:
      - master
permissions: {}
jobs:
  pre-deploy:
    permissions:
      id-token: write
      contents: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/lambda_build.yml@f318ce8a5d99c08b1235663f97fdb1b35844674e # v.0.0.39
    with:
      lambda-name: notifications
      repo-name: tdr-notifications
      artifact-name: notifications
      build-command: |
        sbt assembly
    secrets:
      MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
  deploy:
    needs: pre-deploy
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: gh workflow run deploy.yml -f environment=intg -f to-deploy=$NEXT_VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          NEXT_VERSION: ${{ needs.pre-deploy.outputs.next-version }}

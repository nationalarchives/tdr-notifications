name: TDR Run Lambda Tests
on:
  pull_request:
  push:
    branches-ignore:
      - master
      - release-*
permissions: {}
jobs:
  test:
    permissions:
      id-token: write
      contents: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@9214d929d74b527c75cdac14ba96812f90b3ebba # v.0.0.35
    with:
      repo-name: tdr-notifications
      test-command: |
        sbt test
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
